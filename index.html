<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radkalender – Breitensport in Deutschland</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #222;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 18px;
      font-weight: 600;
      color: #1a7a55;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .logo-circle {
      width: 28px; height: 28px;
      background: #1a7a55;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-circle svg { width: 16px; height: 16px; fill: white; }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
    }

    .filters select, .filters input {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fafafa;
      color: #222;
      outline: none;
      cursor: pointer;
    }

    .filters select:focus, .filters input:focus {
      border-color: #1a7a55;
    }

    .stats {
      font-size: 13px;
      color: #888;
      white-space: nowrap;
    }

    .stats span { font-weight: 600; color: #222; }

    .layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    #map {
      flex: 1;
    }

    .sidebar {
      width: 300px;
      background: #fff;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-head {
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
      font-size: 13px;
      color: #666;
    }

    .event-list {
      flex: 1;
      overflow-y: auto;
    }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
    }

    .event-item:hover { background: #f8f8f5; }

    .event-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .event-info { flex: 1; min-width: 0; }

    .event-name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-meta {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .event-km {
      font-size: 11px;
      color: #aaa;
    }

    .ext { font-size: 11px; color: #ccc; margin-top: 3px; }

    .legend {
      display: flex;
      gap: 12px;
      padding: 8px 14px;
      border-top: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #666;
    }

    .legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
    }

    .source {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: #aaa;
      border-top: 1px solid #f0f0f0;
    }

    .source a { color: #888; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 14px;
      color: #888;
    }

    /* Leaflet popup anpassen */
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .popup-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .popup-meta { font-size: 12px; color: #666; margin-bottom: 2px; }
    .popup-link {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background: #1a7a55;
      color: white;
      border-radius: 5px;
      font-size: 12px;
      text-decoration: none;
    }
    .popup-link:hover { background: #155f42; }

    @media (max-width: 600px) {
      .sidebar { display: none; }
      .filters input[type=date] { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-circle">
      <svg viewBox="0 0 20 20"><circle cx="5" cy="14" r="3.5" stroke="white" stroke-width="2" fill="none"/><circle cx="15" cy="14" r="3.5" stroke="white" stroke-width="2" fill="none"/><path d="M5 14 L10 5 L15 14" stroke="white" stroke-width="2" fill="none"/></svg>
    </div>
    Radkalender
  </div>
  <div class="filters">
    <select id="filter-typ">
      <option value="">Alle Typen</option>
      <option value="rtf">RTF</option>
      <option value="marathon">Radmarathon</option>
      <option value="ctf">CTF</option>
      <option value="gravel">Gravelride</option>
      <option value="vrtf">vRTF</option>
      <option value="volk">Volksradfahren</option>
    </select>
    <input type="date" id="filter-von" title="Von Datum">
    <input type="date" id="filter-bis" title="Bis Datum">
  </div>
  <div class="stats">
    <span id="count">–</span> Termine
  </div>
</header>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-head" id="sidebar-head">Termine werden geladen…</div>
    <div class="event-list" id="event-list">
      <div class="loading">Daten werden geladen…</div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1a7a55"></div>RTF</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c0441a"></div>Marathon</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2266cc"></div>CTF</div>
      <div class="legend-item"><div class="legend-dot" style="background:#a06010"></div>Gravel</div>
      <div class="legend-item"><div class="legend-dot" style="background:#888"></div>Sonstige</div>
    </div>
    <div class="source">
      Daten von <a href="https://breitensport.rad-net.de/breitensportkalender/" target="_blank">rad-net.de</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COLORS = {
  rtf: "#1a7a55",
  marathon: "#c0441a",
  ctf: "#2266cc",
  gravel: "#a06010",
  vrtf: "#7744aa",
  volk: "#e07020",
  sonstige: "#888"
};

// Karte initialisieren
const map = L.map("map").setView([51.2, 10.4], 6);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

let allEvents = [];
let markers = L.layerGroup().addTo(map);

function makeIcon(typ) {
  const color = COLORS[typ] || COLORS.sonstige;
  return L.divIcon({
    className: "",
    html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });
}

function formatDate(str) {
  return str || "";
}

function renderList(events) {
  const list = document.getElementById("event-list");
  document.getElementById("count").textContent = events.length;
  document.getElementById("sidebar-head").textContent =
    `${events.length} Termine`;

  if (events.length === 0) {
    list.innerHTML = `<div class="loading">Keine Termine gefunden</div>`;
    return;
  }

  list.innerHTML = events.map(e => {
    const color = COLORS[e.typ] || COLORS.sonstige;
    return `<a class="event-item" href="${e.url}" target="_blank">
      <div class="event-dot" style="background:${color}"></div>
      <div class="event-info">
        <div class="event-name">${e.titel || "–"}</div>
        <div class="event-meta">${e.datum} · ${e.ort || e.verein || ""}</div>
        <div class="event-km">${e.km || ""}</div>
      </div>
      <div class="ext">↗</div>
    </a>`;
  }).join("");
}

function renderMarkers(events) {
  markers.clearLayers();
  events.forEach(e => {
    if (!e.lat || !e.lng) return;
    const marker = L.marker([e.lat, e.lng], { icon: makeIcon(e.typ) });
    marker.bindPopup(`
      <div class="popup-title">${e.titel || "–"}</div>
      <div class="popup-meta">${e.datum}</div>
      <div class="popup-meta">${e.ort || e.verein || ""}</div>
      <div class="popup-meta">${e.km || ""}</div>
      <a class="popup-link" href="${e.url}" target="_blank">Details auf rad-net ↗</a>
    `);
    markers.addLayer(marker);
  });
}

function applyFilters() {
  const typ = document.getElementById("filter-typ").value;
  const von = document.getElementById("filter-von").value;
  const bis = document.getElementById("filter-bis").value;

  let filtered = allEvents;

  if (typ) {
    filtered = filtered.filter(e => e.typ === typ);
  }

  // Datum-Filter (einfaches String-Matching auf DD.MM.YYYY)
  if (von) {
    const vonDate = new Date(von);
    filtered = filtered.filter(e => {
      const parts = (e.datum || "").match(/(\d{2})\.(\d{2})\.(\d{4})/);
      if (!parts) return true;
      return new Date(`${parts[3]}-${parts[2]}-${parts[1]}`) >= vonDate;
    });
  }
  if (bis) {
    const bisDate = new Date(bis);
    filtered = filtered.filter(e => {
      const parts = (e.datum || "").match(/(\d{2})\.(\d{2})\.(\d{4})/);
      if (!parts) return true;
      return new Date(`${parts[3]}-${parts[2]}-${parts[1]}`) <= bisDate;
    });
  }

  renderList(filtered);
  renderMarkers(filtered);
}

// Daten laden
fetch("events.json")
  .then(r => r.json())
  .then(data => {
    allEvents = data;
    applyFilters();
  })
  .catch(() => {
    document.getElementById("event-list").innerHTML =
      `<div class="loading">Fehler beim Laden der Daten</div>`;
  });

document.getElementById("filter-typ").addEventListener("change", applyFilters);
document.getElementById("filter-von").addEventListener("change", applyFilters);
document.getElementById("filter-bis").addEventListener("change", applyFilters);
</script>

</body>
</html>
