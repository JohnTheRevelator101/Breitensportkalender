<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radsport Breitensportkalender – Interaktive Karte Deutschland</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #222; transition: background 0.3s; }
    body.dark { background: #1a1a1a; color: #e0e0e0; }
    header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    body.dark header { background: #242424; border-bottom-color: #333; }
    .logo { font-size: 17px; font-weight: 600; color: #1a7a55; display: flex; align-items: center; gap: 8px; }
    .logo-circle { width: 26px; height: 26px; background: #1a7a55; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .logo-circle svg { width: 15px; height: 15px; fill: white; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; flex: 1; }
    .filters select, .filters input[type=date] { padding: 5px 9px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; height: 30px; }
    body.dark .filters select, body.dark .filters input { background: #2e2e2e; border-color: #444; color: #e0e0e0; }
    .toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
    .toggle { position: relative; width: 32px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 18px; transition: 0.2s; }
    .toggle input:checked + .toggle-slider { background: #1a7a55; }
    .toggle-slider:before { content: ""; position: absolute; width: 13px; height: 13px; left: 2.5px; top: 2.5px; background: white; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(14px); }
    .stats { font-size: 13px; color: #888; margin-left: auto; }
    .layout { display: flex; height: calc(100vh - 58px); }
    #map { flex: 1; z-index: 1; }
    .sidebar { width: 290px; background: #fff; border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    body.dark .sidebar { background: #242424; border-left-color: #333; }
    .sidebar-head { padding: 9px 13px; border-bottom: 1px solid #e0e0e0; font-size: 12px; color: #666; }
    .event-list { flex: 1; overflow-y: auto; }
    .event-item { display: flex; align-items: flex-start; gap: 9px; padding: 9px 13px; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit; }
    .event-item:hover { background: #f8f8f5; }
    body.dark .event-item:hover { background: #2a2a2a; }
    .event-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .event-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-meta { font-size: 11px; color: #888; }
    .event-location-row { font-size: 11px; color: #888; margin-top: 1px; }
    .legend { display: flex; gap: 10px; padding: 7px 13px; border-top: 1px solid #e0e0e0; flex-wrap: wrap; }
    .legend-item { font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #fff; padding: 28px; border-radius: 10px; max-width: 500px; position: relative; }
    body.dark .modal { background: #242424; }
    .marker-pin { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .user-location-dot { width: 12px; height: 12px; background: #2196F3; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 0 4px rgba(33, 150, 243, 0.3); }
    .popup-link { display: inline-block; margin-top: 8px; padding: 4px 10px; background: #1a7a55; color: white; border-radius: 5px; font-size: 12px; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-circle"><svg viewBox="0 0 20 20"><circle cx="5" cy="14" r="3.5" stroke="white" stroke-width="2" fill="none"/><circle cx="15" cy="14" r="3.5" stroke="white" stroke-width="2" fill="none"/><path d="M5 14 L10 5 L15 14" stroke="white" stroke-width="2" fill="none"/></svg></div>
    <span>Breitensport Karte</span>
  </div>
  <div class="filters">
    <select id="filter-typ">
      <option value="">Alle Typen</option>
      <option value="rtf">RTF</option>
      <option value="marathon">Marathon</option>
      <option value="ctf">CTF</option>
      <option value="gravel">Gravel</option>
    </select>
    <input type="date" id="filter-von">
    <label class="toggle-wrap"><input type="checkbox" id="toggle-past"> Vergangene</label>
    <label class="toggle-wrap"><input type="checkbox" id="toggle-dark"> Dark Mode</label>
  </div>
  <div class="stats"><span id="count">0</span> Termine</div>
</header>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-head" id="sidebar-head">Termine werden geladen...</div>
    <div class="event-list" id="event-list"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1a7a55"></div>RTF</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c0441a"></div>Marathon</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2266cc"></div>CTF</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const COLORS = { rtf: "#1a7a55", marathon: "#c0441a", ctf: "#2266cc", gravel: "#a06010", sonstige: "#888" };
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

let allEvents = [];
let markerMap = {};
const map = L.map("map").setView([51.2, 10.4], 6);
const markers = L.layerGroup().addTo(map);

const lightLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
const darkLayer = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png");

function parseDate(s) { if(!s) return null; const m = s.match(/(\d{2})\.(\d{2})\.(\d{4})/); return m ? new Date(`${m[3]}-${m[2]}-${m[1]}`) : null; }
function isPast(e) { const d = parseDate(e.datum); return d ? d < TODAY : false; }

function highlightMarker(idx) {
  const m = markerMap[idx];
  if (m && m.getElement()) {
    m.getElement().style.transform += " scale(2.5)";
    m.setZIndexOffset(1000);
  }
}

function resetMarker(idx) {
  const m = markerMap[idx];
  if (m && m.getElement()) {
    m.getElement().style.transform = m.getElement().style.transform.replace(" scale(2.5)", "");
    m.setZIndexOffset(0);
  }
}

function makeIcon(typ, past) {
  const color = past ? "#666" : (COLORS[typ] || COLORS.sonstige);
  return L.divIcon({
    className: "marker-pin",
    html: `<div style="width:11px;height:11px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.25)"></div>`,
    iconSize: [11, 11], iconAnchor: [5.5, 5.5]
  });
}

function renderList(events) {
  const list = document.getElementById("event-list");
  document.getElementById("count").textContent = events.length;
  document.getElementById("sidebar-head").textContent = `${events.length} Termine`;
  
  list.innerHTML = events.map((e, idx) => {
    const past = isPast(e);
    const color = past ? "#888" : (COLORS[e.typ] || COLORS.sonstige);
    const ortsInfo = `${e.plz || ''} ${e.startort || e.ort || ''}`.trim();
    return `<a class="event-item" href="${e.url}" target="_blank" onmouseover="highlightMarker(${idx})" onmouseout="resetMarker(${idx})">
      <div class="event-dot" style="background:${color}"></div>
      <div class="event-info">
        <div class="event-name">${e.titel || 'Termin'}</div>
        <div class="event-meta">${e.datum}</div>
        <div class="event-location-row">${ortsInfo || 'Ort unbekannt'}</div>
      </div>
    </a>`;
  }).join("");
}

function renderMarkers(events) {
  markers.clearLayers();
  markerMap = {};
  events.forEach((e, idx) => {
    if (!e.lat || !e.lng) return;
    const m = L.marker([e.lat, e.lng], { icon: makeIcon(e.typ, isPast(e)) });
    m.bindPopup(`<b>${e.titel}</b><br>${e.datum}<br><a class="popup-link" href="${e.url}" target="_blank">Details</a>`);
    markers.addLayer(m);
    markerMap[idx] = m;
  });
}

function applyFilters() {
  const typ = document.getElementById("filter-typ").value;
  const showPast = document.getElementById("toggle-past").checked;
  let filtered = allEvents;
  if (!showPast) filtered = filtered.filter(e => !isPast(e));
  if (typ) filtered = filtered.filter(e => e.typ === typ);
  renderList(filtered);
  renderMarkers(filtered);
}

fetch("events.json").then(r => r.json()).then(data => { allEvents = data; applyFilters(); });

document.getElementById("toggle-dark").addEventListener("change", (e) => {
  if(e.target.checked) { document.body.classList.add("dark"); map.removeLayer(lightLayer); darkLayer.addTo(map); }
  else { document.body.classList.remove("dark"); map.removeLayer(darkLayer); lightLayer.addTo(map); }
});

document.getElementById("filter-typ").addEventListener("change", applyFilters);
document.getElementById("toggle-past").addEventListener("change", applyFilters);
</script>
</body>
</html>
