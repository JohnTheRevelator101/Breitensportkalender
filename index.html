<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radsport Breitensportkalender – Interaktive Karte Deutschland</title>
  <meta name="description" content="Alle RTF, Radmarathon, CTF und Gravelrides in Deutschland auf einer interaktiven Karte. Breitensportkalender mit Kartenansicht.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    /* ... Dein bestehender CSS-Code ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #222;
      transition: background 0.3s, color 0.3s;
    }

    body.dark { background: #1a1a1a; color: #e0e0e0; }
    body.dark header { background: #242424; border-bottom-color: #333; }
    body.dark .filters select, body.dark .filters input[type=date] { background: #2e2e2e; border-color: #444; color: #e0e0e0; }
    body.dark .logo-sub { color: #666; }
    body.dark .sidebar { background: #242424; border-left-color: #333; }
    body.dark .sidebar-head { border-bottom-color: #333; color: #888; }
    body.dark .event-item { border-bottom-color: #2e2e2e; color: #e0e0e0; }
    body.dark .event-item:hover { background: #2a2a2a; }
    body.dark .event-meta { color: #777; }
    body.dark .event-km { color: #555; }
    body.dark .ext { color: #444; }
    body.dark .legend { border-top-color: #333; }
    body.dark .legend-item { color: #777; }
    body.dark .footer-links { border-top-color: #2e2e2e; }
    body.dark .footer-links a { color: #555; }
    body.dark .footer-links a:hover { color: #2db37a; }
    body.dark .source { border-top-color: #2e2e2e; color: #444; }
    body.dark .source a { color: #555; }
    body.dark .toggle-wrap { color: #777; }
    body.dark .stats { color: #555; }
    body.dark .stats span { color: #e0e0e0; }
    body.dark .modal { background: #242424; }
    body.dark .modal h2 { color: #2db37a; }
    body.dark .modal h3 { color: #bbb; }
    body.dark .modal p { color: #999; }
    body.dark .modal-close { color: #555; }
    body.dark .modal-close:hover { color: #bbb; }
    body.dark .modal-overlay { background: rgba(0,0,0,0.75); }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      transition: background 0.3s, border-color 0.3s;
    }

    .logo {
      font-size: 17px;
      font-weight: 600;
      color: #1a7a55;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .logo-circle {
      width: 26px; height: 26px;
      background: #1a7a55;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-circle svg { width: 15px; height: 15px; fill: white; }
    .logo-text { line-height: 1.2; }
    .logo-main { font-size: 15px; font-weight: 600; display: block; }
    .logo-sub { font-size: 10px; font-weight: 400; color: #888; display: block; transition: color 0.3s; }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      flex: 1;
    }

    .filters select, .filters input[type=date] {
      padding: 5px 9px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fafafa;
      color: #222;
      outline: none;
      cursor: pointer;
      height: 30px;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }

    .filters select:focus, .filters input:focus { border-color: #1a7a55; }

    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.3s;
    }

    .toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 18px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .toggle-slider:before {
      content: "";
      position: absolute;
      width: 13px; height: 13px;
      left: 2.5px; top: 2.5px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: #1a7a55; }
    .toggle input:checked + .toggle-slider:before { transform: translateX(14px); }

    .stats { font-size: 13px; color: #888; white-space: nowrap; margin-left: auto; transition: color 0.3s; }
    .stats span { font-weight: 600; color: #222; }

    .layout { display: flex; height: calc(100vh - 58px); }
    #map { flex: 1; }

    .sidebar {
      width: 290px;
      background: #fff;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s, border-color 0.3s;
    }

    .sidebar-head { padding: 9px 13px; border-bottom: 1px solid #e0e0e0; font-size: 12px; color: #666; transition: border-color 0.3s, color 0.3s; }
    .event-list { flex: 1; overflow-y: auto; }

    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 9px 13px;
      border-bottom: 1px solid #f0f0f0;
      text-decoration: none;
      color: inherit;
      transition: background 0.1s, border-color 0.3s;
    }

    .event-item:hover { background: #f8f8f5; }
    .event-item.past { opacity: 0.4; }
    .event-item.past .event-name { text-decoration: line-through; text-decoration-color: #aaa; }

    .event-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .event-info { flex: 1; min-width: 0; }
    .event-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-meta { font-size: 11px; color: #888; margin-top: 1px; transition: color 0.3s; }
    .event-km { font-size: 11px; color: #bbb; transition: color 0.3s; }
    .ext { font-size: 11px; color: #ccc; margin-top: 3px; transition: color 0.3s; }

    .legend { display: flex; gap: 10px; padding: 7px 13px; border-top: 1px solid #e0e0e0; flex-wrap: wrap; transition: border-color 0.3s; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #666; transition: color 0.3s; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    .footer-links { display: flex; gap: 12px; padding: 6px 13px; border-top: 1px solid #f0f0f0; flex-wrap: wrap; transition: border-color 0.3s; }
    .footer-links a { font-size: 10px; color: #999; text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: #1a7a55; }

    .source { text-align: center; padding: 5px; font-size: 10px; color: #bbb; border-top: 1px solid #f0f0f0; transition: color 0.3s, border-color 0.3s; }
    .source a { color: #999; }

    .loading { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 13px; color: #888; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 28px 32px;
      max-width: 520px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      transition: background 0.3s;
    }

    .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; color: #1a7a55; }
    .modal h3 { font-size: 14px; font-weight: 600; margin: 16px 0 6px; color: #333; transition: color 0.3s; }
    .modal p { font-size: 13px; line-height: 1.7; color: #444; margin-bottom: 8px; transition: color 0.3s; }
    .modal a { color: #1a7a55; }
    .modal-close { position: absolute; top: 14px; right: 16px; font-size: 20px; cursor: pointer; color: #aaa; background: none; border: none; line-height: 1; transition: color 0.2s; }
    .modal-close:hover { color: #333; }

    .leaflet-popup-content-wrapper { border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    .popup-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .popup-meta { font-size: 12px; color: #666; margin-bottom: 2px; }
    .popup-past { font-size: 11px; color: #e08020; margin-top: 4px; }
    .popup-link {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background: #1a7a55;
      color: white;
      border-radius: 5px;
      font-size: 12px;
      text-decoration: none;
    }
    .popup-link:hover { background: #155f42; }

    @media (max-width: 600px) {
      .sidebar { display: none; }
      .filters input[type=date] { display: none; }
      .logo-sub { display: none; }
    }


    .user-location-dot {
      width: 12px;
      height: 12px;
      background: #2196F3;
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 0 4px rgba(33, 150, 243, 0.3);
    }

    .event-location-row {
      font-size: 11px;
      color: #888;
      margin-top: 1px;
      transition: color 0.3s;
    }

    body.dark .event-location-row {
      color: #777;
    }

    /* NEU: Styling für den Zoom-Effekt der Marker */
    .marker-pin {
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: center center;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-circle">
      <svg viewBox="0 0 20 20"><circle cx="5" cy="14" r="3.5" stroke="white" stroke-width="2" fill="none"/><circle cx="15" cy="14" r="3.5" stroke="white" stroke-width="2" fill="none"/><path d="M5 14 L10 5 L15 14" stroke="white" stroke-width="2" fill="none"/></svg>
    </div>
    <div class="logo-text">
      <span class="logo-main">Breitensport Karte</span>
      <span class="logo-sub">Radsport Termine in Deutschland</span>
    </div>
  </div>

  <div class="filters">
    <select id="filter-typ">
      <option value="">Alle Typen</option>
      <option value="rtf">RTF</option>
      <option value="marathon">Radmarathon</option>
      <option value="ctf">CTF</option>
      <option value="gravel">Gravelride</option>
      <option value="vrtf">vRTF</option>
      <option value="volk">Volksradfahren</option>
    </select>
    <input type="date" id="filter-von" title="Von Datum">
    <input type="date
